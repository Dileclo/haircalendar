<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#F2F2F7">
  <title>HairCalendar — Нет сети</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100%;
      min-height: 100dvh;
      background: #F2F2F7;
      color: #1C1C1E;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .emoji { font-size: 80px; margin-bottom: 16px; line-height: 1; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: #8E8E93; max-width: 280px; margin-bottom: 24px; line-height: 1.4; }
    button {
      background: #007AFF;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      min-width: 160px;
      transition: opacity 0.2s;
    }
    button:active { opacity: 0.85; }
    @media (prefers-color-scheme: dark) {
      body { background: #000000; color: #FFFFFF; }
      p { color: #8E8E93; }
    }
  </style>
</head>
<body>
  <div class="emoji">📡</div>
  <h1>Нет подключения</h1>
  <p>Проверьте соединение с интернетом и попробуйте снова</p>
  <button onclick="location.reload()">Повторить</button>
</body>
</html>
